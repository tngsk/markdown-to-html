<template id="mono-countdown-template">
    <style>
        {COMPONENTS_CSS}
    </style>
    <div class="countdown-container" part="container">
        <svg class="progress-ring" width="100%" height="100%" viewBox="0 0 100 100">
            <circle class="progress-ring-bg" cx="50" cy="50" r="45"></circle>
            <circle class="progress-ring-circle" cx="50" cy="50" r="45"></circle>
        </svg>
        <div class="time-display" part="time"></div>
    </div>
</template>
