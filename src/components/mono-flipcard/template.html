<template id="mono-flipcard-template">
    <style>
        {COMPONENTS_CSS}
    </style>
    <div class="flipcard-container" part="container">
        <div class="flipcard-inner" part="inner" id="inner">
            <div class="flipcard-front" part="front">
                <span id="front-text"></span>
            </div>
            <div class="flipcard-back" part="back">
                <span id="back-text"></span>
            </div>
        </div>
    </div>
</template>
