<!-- Interactive-MD Web Component Template: situ-poll -->
<template id="situ-poll-template">
    <style>
        /* CSS is injected dynamically by the Python builder */
        {COMPONENTS_CSS}
    </style>
    <div class="poll-wrapper">
        <h3 class="poll-header" data-ref="title"></h3>
        <div class="options-container" data-ref="optionsContainer">
            <!-- Options will be injected here dynamically -->
        </div>
        <div class="submit-container">
            <button class="submit-btn" data-ref="submitBtn" disabled>記録する</button>
            <div class="voted-message hidden" data-ref="votedMessage">
                <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M10.97 4.97a.75.75 0 0 1 1.07 1.05l-3.99 4.99a.75.75 0 0 1-1.08.02L4.324 8.384a.75.75 0 1 1 1.06-1.06l2.094 2.093 3.473-4.425a.267.267 0 0 1 .02-.022z"/></svg>
                記録されました
            </div>
        </div>
    </div>
</template>

<!-- Template for an individual option item -->
<template id="situ-poll-option-template">
    <label class="option-label" data-ref="label">
        <input type="radio" name="poll-option" data-ref="radio">
        <span class="option-text" data-ref="text"></span>
    </label>
</template>
