<script>
/**
 * Mono Components
 *
 * Vanilla JS Web Component for Universal A/B Testing.
 * Uses Web Audio API with crossfading for seamless, pop-free switching.
 * Implements "Lab-Gear Aesthetic" and strict event-driven architecture.
 */

class MonoABTest extends HTMLElement {
  constructor() {
    super();
    this.attachShadow({ mode: "open" });

    // Component State
    this.title = this.getAttribute("title") || "A/B Test";
    this.srcA = this.getAttribute("src-a") || "";
    this.srcB = this.getAttribute("src-b") || "";
    this.componentId =
      this.getAttribute("id") ||
      `abtest-${Math.random().toString(36).substring(2, 9)}`;

    // Playback State
    this.audioContext = null;
    this.audioBufferA = null;
    this.audioBufferB = null;
    this.sourceNodeA = null;
    this.sourceNodeB = null;
    this.gainNodeA = null;
    this.gainNodeB = null;

    this.isPlaying = false;
    this.mediaType = "audio"; // Default to audio, update if image is detected
    this.currentTrack = "A"; // 'A' or 'B'
    this.startTime = 0;
    this.pauseOffset = 0;
    this.duration = 0;
    this.animationFrameId = null;

    // Vote State
    this.hasVoted = false;

    // Cache for DOM references
    this.refs = {};

    this.handleKeyDown = this.handleKeyDown.bind(this);

    // Accessibility & Focus Management
    this.setAttribute("tabindex", "0");
    this.setAttribute("role", "region");
    this.setAttribute("aria-label", "Audio A/B Test Player");
  }


  connectedCallback() {
    this.mountTemplate();

    this.title = this.getAttribute("title") || "A/B Test";
    if (this.refs.title) this.refs.title.textContent = this.title;

    this.srcA = this.getAttribute("src-a");
    this.srcB = this.getAttribute("src-b");

    if (this.srcA && this.srcA.startsWith("data:")) {
      if (this.srcA.includes("image/")) {
         this.mediaType = "image";
      } else {
         this.mediaType = "audio";
      }
    } else if (this.srcA) {
      const ext = this.srcA.split('.').pop().toLowerCase();
      if (["png", "jpg", "jpeg", "gif", "webp", "svg"].includes(ext)) {
        this.mediaType = "image";
      } else {
        this.mediaType = "audio";
      }
    }

    this.setupMediaElements();
    this.checkPreviousVote();
    this.setupEventListeners();

    this.addEventListener("keydown", this.handleKeyDown);

    this.addEventListener("click", () => {
      if (document.activeElement !== this) {
        this.focus();
      }
    });
  }

  setupMediaElements() {
     if (this.mediaType === "image") {
         const imgContainer = document.createElement("div");
         imgContainer.style.position = "relative";
         imgContainer.style.width = "100%";
         imgContainer.style.height = "400px";
         imgContainer.style.overflow = "hidden";
         imgContainer.style.marginBottom = "1rem";
         imgContainer.style.borderRadius = "8px";
         imgContainer.style.backgroundColor = "#e5e7eb";

         const imgA = document.createElement("img");
         imgA.src = this.srcA;
         imgA.style.position = "absolute";
         imgA.style.top = "0";
         imgA.style.left = "0";
         imgA.style.width = "100%";
         imgA.style.height = "100%";
         imgA.style.objectFit = "contain";
         imgA.style.transition = "opacity 0.2s ease";
         imgA.style.opacity = "1";
         this.imgA = imgA;

         const imgB = document.createElement("img");
         imgB.src = this.srcB;
         imgB.style.position = "absolute";
         imgB.style.top = "0";
         imgB.style.left = "0";
         imgB.style.width = "100%";
         imgB.style.height = "100%";
         imgB.style.objectFit = "contain";
         imgB.style.transition = "opacity 0.2s ease";
         imgB.style.opacity = "0";
         this.imgB = imgB;

         imgContainer.appendChild(imgB);
         imgContainer.appendChild(imgA);

         this.refs.title.insertAdjacentElement("afterend", imgContainer);

         if (this.refs.playBtn) this.refs.playBtn.style.display = "none";
         if (this.refs.stopBtn) this.refs.stopBtn.style.display = "none";
         if (this.refs.timeDisplay) this.refs.timeDisplay.style.display = "none";
         if (this.refs.progressContainer) this.refs.progressContainer.style.display = "none";
         if (this.refs.statusLed) this.refs.statusLed.style.display = "none";
         if (this.refs.loadingOverlay) this.refs.loadingOverlay.style.display = "none";

         if (this.refs.switchA) this.refs.switchA.disabled = false;
         if (this.refs.switchB) this.refs.switchB.disabled = false;
     }
  }

  disconnectedCallback() {
    this.stopPlayback();
    if (this.audioContext) {
      this.audioContext.close();
    }
    this.removeEventListener("keydown", this.handleKeyDown);
  }

  // ============================================================================
  // Initialization & Rendering
  // ============================================================================

  mountTemplate() {
    const template = document.getElementById("mono-ab-test-template");
    if (!template) {
      console.error("Template #mono-ab-test-template not found.");
      return;
    }
    this.shadowRoot.appendChild(template.content.cloneNode(true));

    // Cache references
    this.shadowRoot.querySelectorAll("[data-ref]").forEach((el) => {
      this.refs[el.dataset.ref] = el;
    });

    if (this.refs.title) {
      this.refs.title.textContent = this.title;
    }
  }

  checkPreviousVote() {
    try {
      const savedData = localStorage.getItem(`mono_abtest_${this.componentId}`);
      if (savedData) {
        const data = JSON.parse(savedData);
        this.hasVoted = true;
        this.updateVoteUI(data.selected);
      }
    } catch (e) {
      console.warn("Failed to read from localStorage:", e);
    }
  }

  setupEventListeners() {
    // Lazy Load: Initialize AudioContext and load files on first interaction
    const initOnFirstClick = async () => {
      if (this.mediaType === "audio" && !this.audioContext) {
        await this.initializeAudioEngine();
      }
    };

    // Transport Controls
    if (this.refs.playBtn) {
      // Enable play button initially to trigger lazy load
      this.refs.playBtn.disabled = false;
      this.refs.playBtn.title = "Play / Pause (Press 'Space')";
      this.refs.playBtn.addEventListener("click", async () => {
        await initOnFirstClick();
        this.togglePlayPause();
      });
    }

    if (this.refs.stopBtn) {
      this.refs.stopBtn.addEventListener("click", () => this.stopPlayback());
    }

    // Switch Controls
    if (this.refs.switchA) {
      this.refs.switchA.title = "Switch to A (Press 'A' key)";
      this.refs.switchA.addEventListener("click", async () => {
        await initOnFirstClick();
        this.switchTrack("A");
      });
    }
    if (this.refs.switchB) {
      this.refs.switchB.title = "Switch to B (Press 'B' key)";
      this.refs.switchB.addEventListener("click", async () => {
        await initOnFirstClick();
        this.switchTrack("B");
      });
    }

    // Vote Controls
    const voteButtons = ["voteA", "voteNeutral", "voteB"];
    voteButtons.forEach((refName) => {
      if (this.refs[refName]) {
        this.refs[refName].addEventListener("click", (e) => {
          if (!this.hasVoted) {
            this.saveVote(e.target.dataset.vote);
          }
        });
      }
    });
  }

  async handleKeyDown(event) {
    // Prevent interfering if an input inside shadow DOM is focused
    const activeEl = this.shadowRoot.activeElement;
    if (
      activeEl &&
      (activeEl.tagName === "INPUT" || activeEl.tagName === "TEXTAREA")
    ) {
      return;
    }

    const key = event.key.toLowerCase();

    if (key === "a") {
      event.preventDefault();
      if (this.mediaType === "audio" && !this.audioContext) await this.initializeAudioEngine();
      this.switchTrack("A");
    } else if (key === "b") {
      event.preventDefault();
      if (this.mediaType === "audio" && !this.audioContext) await this.initializeAudioEngine();
      this.switchTrack("B");
    } else if (key === " " && this.mediaType === "audio") {
      event.preventDefault(); // Prevent page scroll
      if (!this.audioContext) await this.initializeAudioEngine();
      this.togglePlayPause();
    }
  }

  // ============================================================================
  // Audio Engine (Web Audio API)
  // ============================================================================

  async initializeAudioEngine() {
    if (this.refs.loadingOverlay) {
      this.refs.loadingOverlay.classList.add("is-loading");
    }

    try {
      this.audioContext = new (
        window.AudioContext || window.webkitAudioContext
      )();

      // Fetch and decode both files concurrently
      const [bufferA, bufferB] = await Promise.all([
        this.loadAudioFile(this.srcA),
        this.loadAudioFile(this.srcB),
      ]);

      this.audioBufferA = bufferA;
      this.audioBufferB = bufferB;

      // Use the longer duration for the progress bar
      this.duration = Math.max(bufferA.duration, bufferB.duration);

      // Enable UI controls
      if (this.refs.switchA) this.refs.switchA.disabled = false;
      if (this.refs.switchB) this.refs.switchB.disabled = false;
      if (this.refs.stopBtn) this.refs.stopBtn.disabled = false;

      this.updateTimeDisplay();
    } catch (error) {
      console.error("Audio Initialization Error:", error);
      if (this.refs.errorMessage) {
        this.refs.errorMessage.style.display = "flex";
      }
      if (this.refs.playBtn) this.refs.playBtn.disabled = true;
    } finally {
      if (this.refs.loadingOverlay) {
        this.refs.loadingOverlay.classList.remove("is-loading");
      }
    }
  }

  async loadAudioFile(url) {
    const response = await fetch(url);
    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
    const arrayBuffer = await response.arrayBuffer();
    return await this.audioContext.decodeAudioData(arrayBuffer);
  }

  createSourceAndGains() {
    // Create dual sources for simultaneous playback (perfect sync)
    this.sourceNodeA = this.audioContext.createBufferSource();
    this.sourceNodeA.buffer = this.audioBufferA;

    this.sourceNodeB = this.audioContext.createBufferSource();
    this.sourceNodeB.buffer = this.audioBufferB;

    // Create gain nodes for crossfading
    this.gainNodeA = this.audioContext.createGain();
    this.gainNodeB = this.audioContext.createGain();

    // Initial volumes based on current track
    this.gainNodeA.gain.value = this.currentTrack === "A" ? 1 : 0;
    this.gainNodeB.gain.value = this.currentTrack === "B" ? 1 : 0;

    // Connect routing: Source -> Gain -> Destination
    this.sourceNodeA.connect(this.gainNodeA);
    this.gainNodeA.connect(this.audioContext.destination);

    this.sourceNodeB.connect(this.gainNodeB);
    this.gainNodeB.connect(this.audioContext.destination);

    // Event listener for end of track
    this.sourceNodeA.onended = () => {
      // Only reset if it naturally ended (not manually stopped)
      if (this.isPlaying && this.getCurrentTime() >= this.duration - 0.1) {
        this.stopPlayback();
      }
    };
  }

  // ============================================================================
  // Playback Controls
  // ============================================================================

  togglePlayPause() {
    if (this.audioContext.state === "suspended") {
      this.audioContext.resume();
    }

    if (this.isPlaying) {
      // Pause
      if (this.sourceNodeA) this.sourceNodeA.stop();
      if (this.sourceNodeB) this.sourceNodeB.stop();
      this.pauseOffset = this.getCurrentTime();
      this.isPlaying = false;
    this.mediaType = "audio"; // Default to audio, update if image is detected
      this.updateTransportUI();
      cancelAnimationFrame(this.animationFrameId);
    } else {
      // Play
      // If we reached the end, reset to beginning
      if (this.pauseOffset >= this.duration) {
        this.pauseOffset = 0;
      }

      this.createSourceAndGains();
      this.sourceNodeA.start(0, this.pauseOffset);
      this.sourceNodeB.start(0, this.pauseOffset);
      this.startTime = this.audioContext.currentTime - this.pauseOffset;
      this.isPlaying = true;
      this.updateTransportUI();
      this.animationFrameId = requestAnimationFrame(() =>
        this.updateProgress(),
      );
    }
  }

  stopPlayback() {
    if (this.isPlaying) {
      if (this.sourceNodeA) this.sourceNodeA.stop();
      if (this.sourceNodeB) this.sourceNodeB.stop();
    }
    this.isPlaying = false;
    this.mediaType = "audio"; // Default to audio, update if image is detected
    this.pauseOffset = 0;
    this.updateTransportUI();
    this.updateProgress(true); // Force reset to 0
    cancelAnimationFrame(this.animationFrameId);
  }

  switchTrack(track) {
    if (this.currentTrack === track) return;
    this.currentTrack = track;

    // Update UI
    if (this.refs.switchA) {
      this.refs.switchA.classList.toggle("active", track === "A");
    }
    if (this.refs.switchB) {
      this.refs.switchB.classList.toggle("active", track === "B");
    }

if (this.mediaType === "image") {
        if (track === "A") {
            this.imgA.style.opacity = "1";
            this.imgB.style.opacity = "0";
        } else {
            this.imgA.style.opacity = "0";
            this.imgB.style.opacity = "1";
        }
    } else if (this.mediaType === "audio") {
        // Apply Crossfade (Pop-noise prevention)
        // 20ms linear ramp for seamless transition
        if (this.isPlaying && this.gainNodeA && this.gainNodeB) {
            const now = this.audioContext.currentTime;
            const fadeDuration = 0.02; // 20ms

            this.gainNodeA.gain.cancelScheduledValues(now);
            this.gainNodeB.gain.cancelScheduledValues(now);

            if (track === "A") {
                this.gainNodeA.gain.linearRampToValueAtTime(1, now + fadeDuration);
                this.gainNodeB.gain.linearRampToValueAtTime(0, now + fadeDuration);
            } else {
                this.gainNodeA.gain.linearRampToValueAtTime(0, now + fadeDuration);
                this.gainNodeB.gain.linearRampToValueAtTime(1, now + fadeDuration);
            }
        }
    }
  }

  // ============================================================================
  // UI & Progress Updates
  // ============================================================================

  getCurrentTime() {
    if (this.isPlaying) {
      return this.audioContext.currentTime - this.startTime;
    }
    return this.pauseOffset;
  }

  updateProgress(forceReset = false) {
    const currentTime = forceReset ? 0 : this.getCurrentTime();
    let percentage = 0;

    if (this.duration > 0) {
      percentage = Math.min((currentTime / this.duration) * 100, 100);
    }

    if (this.refs.progressBar) {
      this.refs.progressBar.style.width = `${percentage}%`;
    }

    this.updateTimeDisplay(currentTime);

    if (this.isPlaying && percentage < 100) {
      this.animationFrameId = requestAnimationFrame(() =>
        this.updateProgress(),
      );
    }
  }

  updateTimeDisplay(currentTime = 0) {
    if (!this.refs.timeDisplay) return;

    const formatTime = (time) => {
      const mins = Math.floor(time / 60);
      const secs = Math.floor(time % 60);
      return `${mins.toString().padStart(2, "0")}:${secs.toString().padStart(2, "0")}`;
    };

    this.refs.timeDisplay.textContent = `${formatTime(currentTime)} / ${formatTime(this.duration)}`;
  }

  updateTransportUI() {
    if (this.refs.iconPlay && this.refs.iconPause) {
      this.refs.iconPlay.style.display = this.isPlaying ? "none" : "block";
      this.refs.iconPause.style.display = this.isPlaying ? "block" : "none";
    }
  }

  // ============================================================================
  // Voting & Persistence
  // ============================================================================

  saveVote(value) {
    if (this.hasVoted) return;

    const payload = {
      componentId: this.componentId,
      type: "ab-test",
      title: this.title,
      selected: value,
      timestamp: new Date().toISOString(),
    };

    // Dispatch Custom Event (Phase 3 Compatibility)
    const event = new CustomEvent("mono:vote", {
      detail: payload,
      bubbles: true,
      composed: true,
    });
    this.dispatchEvent(event);

    // Local Storage Mock Persistence (Phase 2)
    try {
      localStorage.setItem(
        `mono_abtest_${this.componentId}`,
        JSON.stringify(payload),
      );
      this.hasVoted = true;
      this.updateVoteUI(value);
    } catch (e) {
      console.error("Failed to save vote:", e);
      alert("評価の保存に失敗しました。");
    }
  }

  updateVoteUI(selectedValue) {
    // Disable all buttons
    const voteButtons = ["voteA", "voteNeutral", "voteB"];
    voteButtons.forEach((refName) => {
      if (this.refs[refName]) {
        this.refs[refName].disabled = true;
        // Highlight selected
        if (this.refs[refName].dataset.vote === selectedValue) {
          this.refs[refName].classList.add("selected");
        }
      }
    });

    if (this.refs.votedMessage) {
      this.refs.votedMessage.style.display = "flex";
    }
  }
}

// Register the custom element
if (!customElements.get("mono-ab-test")) {
  customElements.define("mono-ab-test", MonoABTest);
}


/**
 * Mono Components
 *
 * Vanilla JS Web Component for code blocks.
 * Implements "Light DOM" enhancement strategy: Wraps the original Markdown
 * <pre><code> output to preserve SEO and accessibility, while injecting
 * a copy button and syntax highlighting functionality.
 */

class MonoCodeBlock extends HTMLElement {
  constructor() {
    super();
    this.attachShadow({ mode: "open" });

    // Component state
    this.language = this.getAttribute("language") || "";
    this.refs = {};
  }

  connectedCallback() {
    this.mountTemplate();
    this.setupEventListeners();
    this.initializeSyntaxHighlighting();
  }

  mountTemplate() {
    const template = document.getElementById("mono-code-block-template");
    if (!template) {
      console.error("Template #mono-code-block-template not found.");
      return;
    }
    this.shadowRoot.appendChild(template.content.cloneNode(true));

    // Cache references
    this.shadowRoot.querySelectorAll("[data-ref]").forEach((el) => {
      this.refs[el.dataset.ref] = el;
    });

    // Set Header Label
    if (this.refs.languageLabel) {
      this.refs.languageLabel.textContent = this.language
        ? this.language
        : "Code";
    }

    // Move Light DOM content (the original <pre><code> from markdown) into the slot container
    if (this.refs.contentSlot) {
      // Create a <slot> to project the light DOM content into the Shadow DOM
      const slot = document.createElement("slot");
      this.refs.contentSlot.appendChild(slot);
    }
  }

  setupEventListeners() {
    if (this.refs.copyButton) {
      this.refs.copyButton.addEventListener("click", () =>
        this.handleCopyClick(),
      );
    }
  }

  handleCopyClick() {
    // Look for the <code> element within the Light DOM (children of <mono-code-block>)
    const codeElement = this.querySelector("code");
    if (!codeElement) return;

    // Use textContent to grab raw text, avoiding HTML tags from highlight.js
    const text = codeElement.textContent;

    navigator.clipboard
      .writeText(text)
      .then(() => {
        this.showCopySuccess();
      })
      .catch((err) => {
        console.error("Failed to copy text: ", err);
        this.showCopyError();
      });
  }

  showCopySuccess() {
    const btn = this.refs.copyButton;
    if (!btn) return;

    const originalText = btn.innerHTML;
    btn.innerHTML = "✅ Copied!";
    btn.classList.add("copied");

    // Reset after 2 seconds
    setTimeout(() => {
      btn.innerHTML = originalText;
      btn.classList.remove("copied");
    }, 2000);
  }

  showCopyError() {
    const btn = this.refs.copyButton;
    if (!btn) return;

    const originalText = btn.innerHTML;
    btn.innerHTML = "❌ Error";

    setTimeout(() => {
      btn.innerHTML = originalText;
    }, 2000);
  }

  initializeSyntaxHighlighting() {
    // If highlight.js is loaded globally, apply it to the Light DOM <code> element
    if (window.hljs) {
      const codeElement = this.querySelector("code");
      if (codeElement) {
        // Ensure the language class is set for hljs
        if (
          this.language &&
          !codeElement.classList.contains(`language-${this.language}`)
        ) {
          codeElement.classList.add(`language-${this.language}`);
        }
        window.hljs.highlightElement(codeElement);
      }
    }
  }
}

// Register the custom element
if (!customElements.get("mono-code-block")) {
  customElements.define("mono-code-block", MonoCodeBlock);
}


class MonoExport extends HTMLElement {
    constructor() {
        super();
        this.attachShadow({ mode: "open" });
    }

    connectedCallback() {
        this.mountTemplate();
        this.setupEventListeners();
    }

    mountTemplate() {
        const style = document.createElement("style");
        style.textContent = `{COMPONENTS_CSS}`;
        this.shadowRoot.appendChild(style);

        const container = document.createElement("div");
        container.innerHTML = `
        <div class="mono-export-container">
            <button id="mono-export-fab" class="fab" title="Export Data">
                <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
            </button>
            <div id="mono-export-menu" class="menu hidden">
                <button id="mono-export-download">Download JSON</button>
                <button id="mono-export-sync">Sync to Server</button>
            </div>
        </div>
        `;
        this.shadowRoot.appendChild(container);
    }

    collectData() {
        const data = {};
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key && key.startsWith("mono_")) {
                try {
                    data[key] = JSON.parse(localStorage.getItem(key));
                } catch (e) {
                    data[key] = localStorage.getItem(key);
                }
            }
        }
        return data;
    }

    setupEventListeners() {
        const fab = this.shadowRoot.getElementById("mono-export-fab");
        const menu = this.shadowRoot.getElementById("mono-export-menu");
        const btnDownload = this.shadowRoot.getElementById("mono-export-download");
        const btnSync = this.shadowRoot.getElementById("mono-export-sync");

        fab.addEventListener("click", () => {
            menu.classList.toggle("hidden");
        });

        btnDownload.addEventListener("click", () => {
            const data = this.collectData();
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `export_${new Date().getTime()}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            menu.classList.add("hidden");
        });

        btnSync.addEventListener("click", async () => {
            const data = this.collectData();
            const apiUrl = window.MONO_API_URL;
            if (!apiUrl) {
                alert("API URL (connect_src) is not configured.");
                return;
            }

            try {
                const response = await fetch(apiUrl, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(data)
                });
                if (response.ok) {
                    alert("Sync successful!");
                } else {
                    alert("Sync failed: " + response.statusText);
                }
            } catch (error) {
                alert("Sync failed: " + error.message);
            }
            menu.classList.add("hidden");
        });
    }
}

if (!customElements.get("mono-export")) {
    customElements.define("mono-export", MonoExport);
}

/**
 * Mono Components
 *
 * Vanilla JS Web Component for a notebook input area.
 * It provides a simple text area for users to take notes and
 * persists the content automatically to Local Storage.
 */

class MonoNotebookInput extends HTMLElement {
    constructor() {
        super();
        this.attachShadow({ mode: "open" });
        this.refs = {};
        this.inputId = this.getAttribute("id") || `notebook-${Math.random().toString(36).substr(2, 9)}`;
        this.debounceTimeout = null;
        this.storageUnavailable = false;
    }

    connectedCallback() {
        this.mountTemplate();
        this.setupEventListeners();
        this.restoreData();
    }

    mountTemplate() {
        const template = document.getElementById("mono-notebook-input-template");
        if (!template) {
            console.error("Template #mono-notebook-input-template not found.");
            return;
        }

        this.shadowRoot.appendChild(template.content.cloneNode(true));

        // Cache references
        this.shadowRoot.querySelectorAll("[data-ref]").forEach((el) => {
            this.refs[el.dataset.ref] = el;
        });

        // Test if Local Storage is available
        try {
            const testKey = '__storage_test__';
            localStorage.setItem(testKey, testKey);
            localStorage.removeItem(testKey);
        } catch (e) {
            this.storageUnavailable = true;
            console.warn("Local Storage is not available. Notes will not be persisted.", e);
            if (this.refs.statusIndicator) {
                this.refs.statusIndicator.textContent = "Storage unavailable";
                this.refs.statusIndicator.classList.add("error");
            }
        }
    }

    setupEventListeners() {
        if (this.refs.inputArea) {
            this.refs.inputArea.addEventListener("input", () => this.handleInput());
        }
    }

    getPageId() {
        // Fallback or easily replaceable logic to determine the current page namespace
        return window.location.pathname || 'default-page';
    }

    getStorageKey() {
        return `notebook-input::${this.getPageId()}::${this.inputId}`;
    }

    restoreData() {
        if (this.storageUnavailable || !this.refs.inputArea) return;

        try {
            const stored = localStorage.getItem(this.getStorageKey());
            if (stored) {
                const data = JSON.parse(stored);
                if (data && data.value !== undefined) {
                    this.refs.inputArea.value = data.value;
                }
            }
        } catch (e) {
            console.error("Failed to restore notebook data from Local Storage", e);
        }
    }

    handleInput() {
        if (this.storageUnavailable) return;

        // Clear existing debounce timeout
        if (this.debounceTimeout) {
            clearTimeout(this.debounceTimeout);
        }

        // Set new debounce timeout
        this.debounceTimeout = setTimeout(() => {
            this.saveData();
        }, 500);
    }

    saveData() {
        if (!this.refs.inputArea) return;

        const value = this.refs.inputArea.value;
        const data = {
            id: this.inputId,
            value: value,
            updated_at: new Date().toISOString()
        };

        try {
            localStorage.setItem(this.getStorageKey(), JSON.stringify(data));
            this.showSaveFeedback();
        } catch (e) {
            console.error("Failed to save notebook data to Local Storage", e);
        }
    }

    showSaveFeedback() {
        const indicator = this.refs.statusIndicator;
        if (!indicator) return;

        indicator.textContent = "✓ Saved";
        indicator.classList.remove("error");
        indicator.classList.add("visible");

        setTimeout(() => {
            indicator.classList.remove("visible");
        }, 2000);
    }
}

// Register the custom element
if (!customElements.get("mono-notebook-input")) {
    customElements.define("mono-notebook-input", MonoNotebookInput);
}


/**
 * Mono Components
 *
 * Vanilla JS Web Components for educational and research acoustic systems.
 * Designed with a clean, readable aesthetic.
 * This file relies on HTML templates injected into the main document.
 */

class MonoPoll extends HTMLElement {
  constructor() {
    super();
    this.attachShadow({ mode: "open" });

    // Component state
    this.title = this.getAttribute("title") || "Poll";
    this.options = (this.getAttribute("options") || "")
      .split(",")
      .map((opt) => opt.trim())
      .filter((opt) => opt);
    this.componentId =
      this.getAttribute("id") ||
      `poll-${Math.random().toString(36).substring(2, 9)}`;
    this.hasVoted = false;
    this.selectedValue = null;

    // Cache for DOM references
    this.refs = {};
    this.optionNodes = [];
  }

  connectedCallback() {
    this.checkPreviousVote();
    this.mountTemplate();
    this.setupEventListeners();
    this.updateView();
  }

  checkPreviousVote() {
    try {
      const savedData = localStorage.getItem(`mono_poll_${this.componentId}`);
      if (savedData) {
        const data = JSON.parse(savedData);
        this.hasVoted = true;
        this.selectedValue = data.selected;
      }
    } catch (e) {
      console.warn("Failed to read from localStorage:", e);
    }
  }

  saveVote(value) {
    const payload = {
      componentId: this.componentId,
      type: "poll",
      title: this.title,
      selected: value,
      timestamp: new Date().toISOString(),
    };

    // Phase 3 Compatibility: Dispatch custom event for future backend integration
    const event = new CustomEvent("mono:vote", {
      detail: payload,
      bubbles: true,
      composed: true,
    });
    this.dispatchEvent(event);

    // Mock Persistence (Phase 2)
    try {
      localStorage.setItem(
        `mono_poll_${this.componentId}`,
        JSON.stringify(payload),
      );
      this.hasVoted = true;
      this.selectedValue = value;
      this.updateView();
    } catch (e) {
      console.error("Failed to save vote:", e);
      alert("投票の保存に失敗しました。");
    }
  }

  mountTemplate() {
    // 1. Clone main layout template
    const template = document.getElementById("mono-poll-template");
    if (!template) {
      console.error("Template #mono-poll-template not found.");
      return;
    }
    this.shadowRoot.appendChild(template.content.cloneNode(true));

    // 2. Cache main references
    this.shadowRoot.querySelectorAll("[data-ref]").forEach((el) => {
      this.refs[el.dataset.ref] = el;
    });

    // 3. Bind static data
    if (this.refs.title) {
      this.refs.title.textContent = this.title;
    }

    // 4. Render options dynamically
    const optionTemplate = document.getElementById("mono-poll-option-template");
    if (!optionTemplate || !this.refs.optionsContainer) return;

    this.options.forEach((opt) => {
      const node = optionTemplate.content.cloneNode(true);

      const label = node.querySelector('[data-ref="label"]');
      const radio = node.querySelector('[data-ref="radio"]');
      const text = node.querySelector('[data-ref="text"]');

      text.textContent = opt;
      radio.value = opt;

      this.refs.optionsContainer.appendChild(node);

      // Store references to the appended elements for state updates
      const appendedLabel = this.refs.optionsContainer.lastElementChild;
      const appendedRadio = appendedLabel.querySelector("input");

      this.optionNodes.push({
        value: opt,
        label: appendedLabel,
        radio: appendedRadio,
      });
    });
  }

  handleSelection(value) {
    if (this.hasVoted) return;

    // Reset visual state
    this.optionNodes.forEach((node) => {
      node.label.classList.remove("selected");
    });

    // Apply selected state
    const selectedNode = this.optionNodes.find((n) => n.value === value);
    if (selectedNode) {
      selectedNode.label.classList.add("selected");
    }

    // Enable submit button
    if (this.refs.submitBtn) {
      this.refs.submitBtn.disabled = false;
    }
  }

  setupEventListeners() {
    // Radio selection events
    this.optionNodes.forEach((node) => {
      node.radio.addEventListener("change", () => {
        this.handleSelection(node.value);
      });
    });

    // Submit button event
    if (this.refs.submitBtn) {
      this.refs.submitBtn.addEventListener("click", () => {
        const selectedNode = this.optionNodes.find((n) => n.radio.checked);
        if (selectedNode) {
          this.saveVote(selectedNode.value);
        }
      });
    }
  }

  updateView() {
    if (!this.hasVoted) return;

    // Update options state (lock inputs, set final visual selection)
    this.optionNodes.forEach((node) => {
      node.radio.disabled = true;
      node.label.classList.add("voted");

      if (node.value === this.selectedValue) {
        node.radio.checked = true;
        node.label.classList.add("selected");
      } else {
        node.radio.checked = false;
        node.label.classList.remove("selected");
      }
    });

    // Toggle visibility between submit button and success message
    if (this.refs.submitBtn) {
      this.refs.submitBtn.style.display = "none";
    }
    if (this.refs.votedMessage) {
      this.refs.votedMessage.style.display = "flex";
    }
  }
}

// Register the custom element
if (!customElements.get("mono-poll")) {
  customElements.define("mono-poll", MonoPoll);
}
